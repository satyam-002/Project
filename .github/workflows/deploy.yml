name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t my-frontend:${{ github.sha }} ./frontend

      - name: Load Image into Minikube
        run: minikube image load my-frontend:${{ github.sha }}

      - name: Update Kubernetes Deployment Image
        run: kubectl set image deployment/frontend-deployment frontend=my-frontend:${{ github.sha }}

      - name: Restart rollout
        run: kubectl rollout restart deployment frontend-deployment